<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1a1a;
      --paper: #f7f4ef;
      --rule: #ddd8cf;
      --accent: #c94f2a;
      --muted: #9a9590;
      --canvas-bg: #ffffff;
    }

    body {
      background: var(--paper);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 1;
    }

    header p {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.5rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card {
      background: var(--canvas-bg);
      border: 1px solid var(--rule);
      border-radius: 2px;
      width: 100%;
      max-width: 640px;
      padding: 1.5rem;
      box-shadow: 0 2px 24px rgba(0,0,0,0.04);
    }

    .canvas-wrap {
      position: relative;
      border-bottom: 2px solid var(--rule);
      margin-bottom: 1.5rem;
      cursor: crosshair;
    }

    .canvas-wrap::after {
      content: 'sign here';
      position: absolute;
      bottom: 0.6rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.65rem;
      color: var(--rule);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .canvas-wrap.signed::after {
      opacity: 0;
    }

    canvas {
      display: block;
      width: 100%;
      height: 180px;
      touch-action: none;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .pen-options {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex: 1;
    }

    .pen-label {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .color-dots {
      display: flex;
      gap: 0.4rem;
    }

    .dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s;
    }

    .dot:hover { transform: scale(1.2); }
    .dot.active { border-color: var(--ink); }

    .dot-dark { background: #1a1a1a; }
    .dot-red  { background: #c94f2a; }
    .dot-blue { background: #2a5fc9; }

    .size-slider {
      -webkit-appearance: none;
      height: 2px;
      background: var(--rule);
      border-radius: 1px;
      outline: none;
      width: 70px;
      cursor: pointer;
    }

    .size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ink);
      cursor: pointer;
      transition: transform 0.15s;
    }

    .size-slider::-webkit-slider-thumb:hover { transform: scale(1.3); }

    .actions {
      display: flex;
      gap: 0.5rem;
      margin-left: auto;
    }

    button {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border: 1px solid var(--rule);
      border-radius: 2px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.15s;
      background: transparent;
      color: var(--muted);
    }

    button:hover {
      border-color: var(--ink);
      color: var(--ink);
    }

    .btn-download {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .btn-download:hover {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    .btn-download:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .format-tabs {
      display: flex;
      gap: 0.3rem;
    }

    .tab {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--rule);
      border-radius: 2px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
    }

    .tab.active {
      background: var(--ink);
      color: var(--paper);
      border-color: var(--ink);
    }

    .footer-row {
      margin-top: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    @media (max-width: 480px) {
      .controls { flex-direction: column; align-items: flex-start; }
      .actions { margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <h1>Sign.</h1>
  <p>Draw · Download · Done</p>
</header>

<div class="card">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="sig" width="1280" height="360"></canvas>
  </div>

  <div class="controls">
    <div class="pen-options">
      <span class="pen-label">Ink</span>
      <div class="color-dots">
        <div class="dot dot-dark active" data-color="#1a1a1a"></div>
        <div class="dot dot-red"  data-color="#c94f2a"></div>
        <div class="dot dot-blue" data-color="#2a5fc9"></div>
      </div>
      <span class="pen-label" style="margin-left:0.5rem">Size</span>
      <input class="size-slider" type="range" id="penSize" min="1" max="12" value="3"/>
    </div>

    <div class="actions">
      <button id="btnClear">Clear</button>
      <div class="format-tabs">
        <button class="tab active" data-fmt="png">PNG</button>
        <button class="tab" data-fmt="svg">SVG</button>
      </div>
      <button class="btn-download" id="btnDownload" disabled>Download</button>
    </div>
  </div>
</div>

<script>
  const canvas = document.getElementById('sig');
  const ctx = canvas.getContext('2d');
  const wrap = document.getElementById('canvasWrap');
  const btnDownload = document.getElementById('btnDownload');
  const btnClear = document.getElementById('btnClear');

  let drawing = false;
  let hasSigned = false;
  let color = '#1a1a1a';
  let size = 3;
  let fmt = 'png';
  let paths = []; // for SVG export
  let currentPath = null;

  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const src = e.touches ? e.touches[0] : e;
    return {
      x: (src.clientX - rect.left) * scaleX,
      y: (src.clientY - rect.top) * scaleY
    };
  }

  function startDraw(e) {
    e.preventDefault();
    drawing = true;
    const p = getPos(e);
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    currentPath = { color, size, points: [p] };
  }

  function draw(e) {
    if (!drawing) return;
    e.preventDefault();
    const p = getPos(e);
    ctx.strokeStyle = color;
    ctx.lineWidth = size * (canvas.width / canvas.offsetWidth);
    ctx.lineTo(p.x, p.y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y);
    currentPath.points.push(p);
    if (!hasSigned) {
      hasSigned = true;
      wrap.classList.add('signed');
      btnDownload.disabled = false;
    }
  }

  function endDraw(e) {
    if (!drawing) return;
    drawing = false;
    if (currentPath && currentPath.points.length > 1) {
      paths.push(currentPath);
    }
    currentPath = null;
  }

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', endDraw);
  canvas.addEventListener('mouseleave', endDraw);
  canvas.addEventListener('touchstart', startDraw, { passive: false });
  canvas.addEventListener('touchmove', draw, { passive: false });
  canvas.addEventListener('touchend', endDraw);

  // Color dots
  document.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', () => {
      document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
      dot.classList.add('active');
      color = dot.dataset.color;
    });
  });

  // Size slider
  document.getElementById('penSize').addEventListener('input', e => {
    size = +e.target.value;
  });

  // Format tabs
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      fmt = tab.dataset.fmt;
    });
  });

  // Clear
  btnClear.addEventListener('click', () => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    paths = [];
    hasSigned = false;
    wrap.classList.remove('signed');
    btnDownload.disabled = true;
  });

  // Download
  btnDownload.addEventListener('click', () => {
    if (fmt === 'png') downloadPNG();
    else downloadSVG();
  });

  function downloadPNG() {
    // Render white bg copy
    const tmp = document.createElement('canvas');
    tmp.width = canvas.width;
    tmp.height = canvas.height;
    const tc = tmp.getContext('2d');
    tc.fillStyle = '#ffffff';
    tc.fillRect(0, 0, tmp.width, tmp.height);
    tc.drawImage(canvas, 0, 0);
    const a = document.createElement('a');
    a.download = 'signature.png';
    a.href = tmp.toDataURL('image/png');
    a.click();
  }

  function downloadSVG() {
    const w = canvas.width, h = canvas.height;
    let svgPaths = '';
    for (const path of paths) {
      if (path.points.length < 2) continue;
      let d = `M ${path.points[0].x} ${path.points[0].y}`;
      for (let i = 1; i < path.points.length; i++) {
        d += ` L ${path.points[i].x} ${path.points[i].y}`;
      }
      svgPaths += `<path d="${d}" stroke="${path.color}" stroke-width="${path.size * 2}" stroke-linecap="round" stroke-linejoin="round" fill="none"/>`;
    }
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}">
  <rect width="${w}" height="${h}" fill="white"/>
  ${svgPaths}
</svg>`;
    const blob = new Blob([svg], { type: 'image/svg+xml' });
    const a = document.createElement('a');
    a.download = 'signature.svg';
    a.href = URL.createObjectURL(blob);
    a.click();
  }
</script>
</body>
</html>
